const AI1_PREFILL = "**Friday is Your Revenue Anchor — Protect It**\nYour Friday peak (3,000 visits) generates ~25% of weekly traffic. Staff your best injectors on Fridays and consider extending hours to 7pm. At $350 avg ticket, adding just 5 patients on Fridays = $1,750/week = $91K/year.\n\n**Thursday is Your Weakest Day — Fix It**\nThursday traffic (700) is 72% below your daily average. Launch \"Therapeutic Thursdays\" with bundled pricing (facial + IV for $199). Fill 15 empty slots/week at even $200/visit = $3,000/week recovered.\n\n**Your Loyalty is Elite — But Your Funnel is Empty**\n4.08x visit frequency is exceptional, ranking in the top 5% of medspas nationally. However, 2,900 unique visitors vs Facial Mania's 12,100 means you're retaining brilliantly but acquiring poorly. Invest $1,500/mo in geo-targeted Google Ads across your top 5 zips.\n\n**Hispanic Market is Under-Penetrated**\n73.8% Hispanic trade area with a 368 over-index, yet your site is English-only. Your nearest competitor (Beyond Health MedSpa) actively markets in Spanish 2.5 miles away. A bilingual landing page + Spanish Google Ads could capture 15-25 new patients/month.\n\n**Post-Visit Shopping Pattern = Partnership Gold**\n10.6% of your patients go shopping after appointments (Dadeland Mall 71.1% cross-visit rate). Co-market with Dadeland retailers — leave branded materials in luxury stores, offer cross-promotions with boutiques near your patients' shopping patterns.";
const AI2_PREFILL = "**Launch $129/mo VIP Membership — Add $12,900/mo Recurring**\nYour 4.08x visit frequency proves patients love you. Convert 100 repeat patients to a $129/mo membership (monthly facial + 15% off injectables + priority booking). That's $12,900/mo in guaranteed recurring revenue before they even walk in.\n\n**List Injectable Pricing — Recover $4-7K/mo in Lost Leads**\nYour highest-margin services (Botox, fillers) have zero pricing on your website. Competitors list \"from $9.99/unit.\" Patients comparison-shop online — if they can't find your price, they book elsewhere. Add \"starting at\" pricing to capture search traffic.\n\n**Add HSA/FSA Payment Badges — Capture $3,900/Patient**\n42.7% of your trade area has employer insurance with an average $3,900 in unused HSA/FSA funds. Most patients don't realize medspa treatments can qualify. Add HSA/FSA badges to every service page and train front desk to mention it at booking.\n\n**Expand Retail Skincare to $8-12K/mo**\nYou feature PRX but lack a dedicated shop page. Brickell Cosmetic Center sells SkinCeuticals, SkinBetter, and ZO Skin Health online. Medical-grade skincare runs 40-60% margins. Stock 3 premium lines, create an online shop, and train staff to recommend post-treatment products.\n\n**Eliminate 3.75% Credit Card Surcharge**\nYour surcharge creates checkout friction and negative reviews. At $85K/mo revenue, you're collecting ~$3,187/mo in surcharges but likely losing more than that in abandoned bookings and reduced tips. Absorb the cost — raise prices 2-3% instead.";
const AI3_PREFILL = "## EXECUTIVE SUMMARY\n\nRejuvaline Medspa operates with exceptional patient loyalty (4.08x annual visit frequency, top 5% nationally) but faces a critical acquisition gap — just 2,900 unique visitors vs. competitors averaging 10,000+. The practice is leaving an estimated $380-650K/year on the table across 7 identified gaps. This plan targets $41K/mo in new revenue within 12 months through patient acquisition, retention optimization, and digital infrastructure improvements.\n\n## PATIENT ACQUISITION: 90-DAY SPRINT\n\n**Weeks 1-4: Digital Foundation**\nLaunch bilingual website (Spanish landing pages for all service categories). Add transparent \"starting at\" pricing for injectables, facials, and laser services. Fix broken Instagram feed on homepage. Estimated cost: $3-5K one-time. Expected impact: +20% organic traffic within 60 days.\n\n**Weeks 5-8: Paid Acquisition**\nDeploy $1,500/mo Google Ads budget targeting top 5 zip codes (33155, 33137, 33165, 33156, 33032 = 54% of current patients). Keywords: \"botox miami,\" \"medspa coral gables,\" \"semaglutide miami.\" Expected CPA: $43-60. New patients/mo: 25-35. Revenue at $350 avg ticket: $8,750-12,250/mo.\n\n**Weeks 9-12: Membership Launch**\nLaunch 2-tier membership: Essential ($99/mo — monthly facial + 10% off) and VIP ($149/mo — monthly facial + 20% off injectables + priority booking). Target: 50 members by end of Q1 = $5,000-7,450/mo recurring.\n\n## RETENTION & LTV OPTIMIZATION\n\nCurrent return rate (52%) leaves room for improvement. Industry leaders achieve 65-70%. Implement automated post-visit email sequences (treatment reminders at optimal intervals), birthday/anniversary offers, and referral rewards ($50 credit per referral). Each 1% improvement in retention = ~$10K/yr additional revenue.\n\n## REVENUE OPTIMIZATION\n\n**Service Mix Rebalancing:** Injectables (65-80% margin) should be 35-45% of revenue. Ensure Botox/filler pricing is visible and competitive. **Retail Expansion:** Add dedicated skincare shop with 3 medical-grade lines. Target $8-12K/mo at 50% margins. **Mobile Services Premium:** You're the only competitor offering mobile IV/injectables — charge 30-50% premium and market aggressively to hotels and corporate offices.\n\n## MARKETING PLAYBOOK\n\nAllocate $3,500/mo total: Google Ads ($1,500), Instagram/Meta ($1,000), Content/SEO ($500), Partnerships ($500). Focus creative on before/after gallery (78% of patients cite as \"very important\"), bilingual content, and pricing transparency. Partner with Dadeland Mall retailers (71.1% cross-visit rate) for co-marketing.\n\n## 12-MONTH PROJECTION\n\nMonth 1-3: +$8-12K/mo (paid ads + quick wins)\nMonth 4-6: +$18-25K/mo (membership launch + retail + bilingual site)\nMonth 7-9: +$28-35K/mo (compound growth + referral program)\nMonth 10-12: +$35-41K/mo (full optimization + partnership revenue)\n\n**Conservative 12-month total: +$312K in new revenue. Aggressive: +$492K.**";

/* ========== COMPONENTS ========== */

function Bar({ v, max, color, h = 6 }) {
  return (
    <div style={{width:"100%",height:h,borderRadius:h,background:"rgba(148,163,184,0.06)"}}>
      <div style={{width:`${Math.min((v/max)*100,100)}%`,height:"100%",borderRadius:h,background:color||C.a,transition:"width 0.7s"}} />
    </div>
  );
}

function Spark({ data, color = C.a, h = 56 }) {
  const vals = data.map(d => d[1]);
  const mx = Math.max(...vals), mn = Math.min(...vals), rng = mx - mn || 1;
  const pts = vals.map((v, i) => `${(i/(vals.length-1))*100},${100-((v-mn)/rng)*75-12}`).join(" ");
  return (
    <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{width:"100%",height:h,display:"block"}}>
      <defs>
        <linearGradient id={`sg${h}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={`0,100 ${pts} 100,100`} fill={`url(#sg${h})`} />
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" vectorEffect="non-scaling-stroke" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function Pill({ children, color, bg }) {
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"4px 12px",borderRadius:20,background:bg,fontSize:11,fontWeight:700,color,letterSpacing:0.3}}>{children}</span>
  );
}

function Card({ children, glow, style = {} }) {
  return (
    <div style={{background:C.cd,borderRadius:14,padding:22,border:`1px solid ${glow?C.ba:C.bd}`,...(glow?{boxShadow:`0 0 24px ${C.ad}`}:{}),...style}}>{children}</div>
  );
}

function Sec({ title, sub, children }) {
  return (
    <div>
      <h3 style={{margin:"0 0 4px",fontSize:15,fontWeight:700,color:C.t,fontFamily:FONT}}>{title}</h3>
      {sub && <div style={{fontSize:12,color:C.td,marginBottom:14}}>{sub}</div>}
      {!sub && <div style={{marginBottom:14}} />}
      {children}
    </div>
  );
}

function Metric({ label, value, sub, trend, color, icon }) {
  const tc = trend > 0 ? C.gb : trend < 0 ? C.rb : C.ts;
  const tb = trend > 0 ? C.gd : trend < 0 ? C.rd : "transparent";
  return (
    <div style={{background:C.cd,borderRadius:14,padding:"18px 20px",border:`1px solid ${C.bd}`,flex:"1 1 180px",minWidth:170,position:"relative"}}>
      {icon && <div style={{position:"absolute",top:14,right:16,fontSize:20,opacity:0.4}}>{icon}</div>}
      <div style={{fontSize:10.5,fontWeight:700,color:C.td,textTransform:"uppercase",letterSpacing:1.3,marginBottom:6}}>{label}</div>
      <div style={{fontSize:28,fontWeight:800,color:color||C.t,lineHeight:1.1,fontFamily:FONT}}>{value}</div>
      {sub && <div style={{fontSize:11,color:C.td,marginTop:5}}>{sub}</div>}
      {trend !== undefined && <div style={{marginTop:6}}><Pill color={tc} bg={tb}>{trend > 0 ? "↑" : trend < 0 ? "↓" : "→"} {Math.abs(trend)}% YoY</Pill></div>}
    </div>
  );
}

function Bench({ label, yours, industry, unit = "", better = "higher" }) {
  const diff = yours - industry;
  const pct = industry !== 0 ? ((diff/industry)*100).toFixed(0) : 0;
  const good = better === "higher" ? diff > 0 : diff < 0;
  return (
    <div style={{padding:"14px 16px",borderRadius:12,background:C.sf,border:`1px solid ${C.bd}`}}>
      <div style={{fontSize:10.5,fontWeight:700,color:C.td,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>{label}</div>
      <div style={{display:"flex",alignItems:"baseline",gap:8,flexWrap:"wrap"}}>
        <span style={{fontSize:24,fontWeight:800,color:C.t,fontFamily:FONT}}>{unit}{yours.toLocaleString()}</span>
        <Pill color={good?C.gb:C.rb} bg={good?C.gd:C.rd}>{good ? "↑" : "↓"} {Math.abs(pct)}% vs index</Pill>
      </div>
      <div style={{fontSize:11,color:C.td,marginTop:4}}>Index avg: {unit}{industry.toLocaleString()}</div>
    </div>
  );
}

function BarChart({ data, color, h = 130 }) {
  const mx = Math.max(...data.map(d => d[1]));
  return (
    <div style={{display:"flex",alignItems:"flex-end",gap:5,height:h}}>
      {data.map(([l, v], i) => {
        const bh = mx > 0 ? (v/mx)*h*0.82 : 0;
        const pk = v === mx;
        return (
          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
            <div style={{fontSize:9.5,color:C.td,fontWeight:700}}>{v > 0 ? v.toLocaleString() : ""}</div>
            <div style={{width:"100%",maxWidth:36,height:Math.max(bh,2),borderRadius:5,background:pk?`linear-gradient(180deg,${color||C.ab},${C.a})`:"rgba(15,23,42,0.06)",transition:"height 0.6s",boxShadow:pk?`0 0 12px ${C.ad}`:"none"}} />
            <div style={{fontSize:10.5,color:pk?C.a:C.ts,fontWeight:pk?700:500}}>{l}</div>
          </div>
        );
      })}
    </div>
  );
}

function H2H({ label, yours, comp1, comp2, fmt, better = "higher" }) {
  const vals = [yours, comp1, comp2];
  const best = better === "higher" ? Math.max(...vals) : Math.min(...vals);
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 110px 110px 110px",gap:6,padding:"9px 0",borderBottom:`1px solid ${C.dv}`,alignItems:"center"}}>
      <div style={{fontSize:11.5,color:C.ts,fontWeight:600}}>{label}</div>
      {vals.map((v, i) => {
        const isB = v === best;
        const colors = [
          {bg:C.gd,fg:C.gb},
          {bg:"rgba(251,113,133,0.08)",fg:"#FB7185"},
          {bg:"rgba(251,191,36,0.08)",fg:"#FBBF24"}
        ];
        return (
          <div key={i} style={{textAlign:"center",padding:"5px 8px",borderRadius:8,background:isB?colors[i].bg:"transparent"}}>
            <span style={{fontSize:14,fontWeight:800,color:isB?colors[i].fg:C.ts,fontFamily:FONT}}>{fmt(v)}</span>
          </div>
        );
      })}
    </div>
  );
}

function AIPanel({ text, loading, onRegen, title = "AI-Powered Insights" }) {
  if (loading) {
    return (

        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>

          <span style={{fontSize:13,fontWeight:700,color:C.a}}>Generating Analysis...</span>
        </div>
        <div style={{display:"flex",gap:5}}>

        </div>
        <style>{`@keyframes aip{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}`}</style>

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>

      <div style={{fontSize:13.5,lineHeight:1.75,color:C.t,whiteSpace:"pre-wrap"}}>
